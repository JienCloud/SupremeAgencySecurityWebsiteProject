<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #417690;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #417690;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Dashboard</h2>

    <p>Welcome <strong>{{ request.user.username }}</strong></p>

    <form action="/logout/" method="POST">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
</div>

</body>
</html>
